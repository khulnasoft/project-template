---
name: Docker Build GitHub CentOS

on:
  push:
    branches:
      - master
      - main
    paths:
      - centos-github/Dockerfile
      - .github/workflows/docker_build_centos_github.yaml
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  docker_build:
    name: Docker Build
    # github.event.repository context not available in scheduled workflows
    #if: github.event.repository.fork == false
    if: |
      github.repository_owner == 'KhulnaSoft' &&
      (
        github.event_name == 'schedule' ||
        (
          github.ref_type == 'branch' &&
          ( github.ref_name == github.event.repository.default_branch || github.ref_name == 'docker' )
        )
      )
    uses: KhulnaSoft/GitHub-Actions/.github/workflows/docker_build.yaml@master
    with:
      repo_tags: |
        khulnasoft/centos-github:latest
        khulnasoft/github:centos
        ghcr.io/khulnasoft/centos-github:latest
        ghcr.io/khulnasoft/github:centos
      context: centos-github
    secrets:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    permissions:
      contents: read
      packages: write
