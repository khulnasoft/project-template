---
name: Dockerfiles

on:
  push:
    branches:
      - master
      - main
    paths:
      - '**Dockerfile**'
  pull_request:
    branches:
      - master
      - main
    paths:
      - '**Dockerfile**'
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        required: false
        default: false
  #schedule:
  #  - cron: '0 0 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check_dockerfiles:
    # github.event.repository context not available in scheduled workflows
    #if: github.event.repository.fork == false
    if: github.repository_owner == 'KhulnaSoft'
    name: Check Dockerfiles
    uses: KhulnaSoft/GitHub-Actions/.github/workflows/dockerfiles.yaml@master
