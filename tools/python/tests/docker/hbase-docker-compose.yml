version: '2.2'
services:
  hbase:
    extends:
      file: common.yml
      service: common
    image: khulnasoft/hbase-dev:${VERSION:-latest}
    ports:
      - 2181
      - 8080
      - 8085
      - 9090
      - 9095
      - 16000
      - 16010
      - 16030 # for HBase 0.99
      - 16201
      - 16301
      # older ports for HBase 0.96
      - 60000
      - 60010
      - 60201
      - 60301
    networks:
      - hbase

networks:
  hbase:
