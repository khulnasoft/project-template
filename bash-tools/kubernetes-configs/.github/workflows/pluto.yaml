---
name: Pluto

on:
  push:
    branches:
      - master
    paths:
      #- '**.y*ml'
      - .github/workflows/pluto.yaml
  pull_request:
    branches:
      - master
    paths:
      - '**.y*ml'
      - .github/workflows/pluto.yaml
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        required: false
        default: false
  schedule:
    - cron: '0 0 * * 1'

jobs:
  pluto:
    name: Pluto
    uses: KhulnaSoft/GitHub-Actions/.github/workflows/pluto.yaml@master
    with:
      debug: ${{ github.event.inputs.debug }}
